services:
  api:
    build: ./api
    working_dir: /app
    expose:
      - 80
    ports:
      - "${HOST_IP-127.0.0.1}:8000:80"
    volumes:
      - ./api:/app:z
      - /app/.venv
      - uv_cache:/root/.cache/uv:z
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api/health"]
      timeout: 5s
      retries: 5
      start_period: 10s
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "80",
        "--reload",
      ]

  postgres-prefect:
    image: docker.io/postgres:17-alpine3.23
    environment:
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: prefect
      POSTGRES_DB: prefect
    volumes:
      - ./prefect/postgres:/var/lib/postgresql/data:z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect"]
      interval: 5s
      timeout: 5s
      retries: 5

  dragonfly:
    image: ghcr.io/dragonflydb/dragonfly:v1.38.0
    expose:
      - 6379
    restart: always
    volumes:
      - ./prefect/dragonfly:/data:z
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    command:
      [
        "--proactor_threads=2",
        "--maxmemory=512mb",
        "--bind=0.0.0.0",
        "--port=6379",
      ]

  prefect-server:
    image: docker.io/prefecthq/prefect:sha-093cd05-python3.11-conda
    depends_on:
      postgres-prefect:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://prefect:prefect@postgres-prefect:5432/prefect
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_SERVER_UI_API_URL: http://${HOST_IP-127.0.0.1}:4200/api
      PREFECT_MESSAGING_BROKER: prefect_redis.messaging
      PREFECT_MESSAGING_CACHE: prefect_redis.messaging
      PREFECT_REDIS_MESSAGING_HOST: dragonfly
      PREFECT_REDIS_MESSAGING_PORT: 6379
      PREFECT_REDIS_MESSAGING_DB: 0
    env_file: .env
    command: prefect server start --no-services
    restart: always
    ports:
      - "${HOST_IP-127.0.0.1}:4200:4200"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request as u; u.urlopen('http://127.0.0.1:4200/api/health', timeout=1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  prefect-services:
    image: docker.io/prefecthq/prefect:sha-093cd05-python3.11-conda
    depends_on:
      prefect-server:
        condition: service_healthy
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://prefect:prefect@postgres-prefect:5432/prefect
      PREFECT_MESSAGING_BROKER: prefect_redis.messaging
      PREFECT_MESSAGING_CACHE: prefect_redis.messaging
      PREFECT_REDIS_MESSAGING_HOST: dragonfly
      PREFECT_REDIS_MESSAGING_PORT: 6379
      PREFECT_REDIS_MESSAGING_DB: 0
    command: prefect server services start

  prefect-worker:
    image: docker.io/prefecthq/prefect:sha-093cd05-python3.11-conda
    depends_on:
      prefect-server:
        condition: service_healthy
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
    env_file: .env
    volumes:
      - ./prefect/app:/prefect:z
    command: prefect worker start --pool local-pool
    restart: on-failure

  postgres-warehouse:
    image: docker.io/postgres:18.3-alpine3.23
    restart: always
    environment:
      POSTGRES_USER: ${WAREHOUSE_USER-postgres}
      POSTGRES_DB: ${WAREHOUSE_DB-postgres}
      POSTGRES_PASSWORD: ${WAREHOUSE_PASSWORD-postgres}
    env_file: .env
    ports:
      - "${HOST_IP-127.0.0.1}:5432:5432"
    volumes:
      - ./warehouse:/var/lib/postgresql/data:z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WAREHOUSE_USER} -d ${WAREHOUSE_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  uv_cache:
